transcription:
  model: medium
  device: auto
  compute_type: auto
  vad_filter: true
  word_timestamps: true
  beam_size: 5
  batch_size: 8

translation:
  provider: nllb
  model: facebook/nllb-200-distilled-600M
  device: auto
  batch_size: 8
  max_length: 256

segmentation:
  max_pause_seconds: 0.8
  max_block_duration: 12.0
  max_block_characters: 300

subtitles:
  max_chars_per_line: 42
  max_lines: 2
  min_duration: 1.0
  max_duration: 7.0
  max_chars_per_second: 20
